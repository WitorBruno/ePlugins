# Opções gerais do plugin
Options:
   # Comandos não permitidos enquanto o jogador abre uma caixa
   # Se estiver vazio o jogador não é impedido de usar Comandos
   # Liste os comandos caso queria bloquear
   Commands-Blacklist: ['/x1', 'arenas']
   
   # Mundos onde o jogador não pode abrir caixas   
   Worlds-Blacklist: ['']

   # Abrir a caixa instantaneamente sem mostrar a animação
   Instant: false
