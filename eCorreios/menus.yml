# Sistema de menus.

# Setas dos menus.
arrows:
  back:
    material: 'ARROW'
    name: '&cVoltar'
    lore: ['&7Clique para voltar ao menu anterior.']
  previous:
    material: 'ARROW'
    name: '&cAnterior'
    lore: ['&7Clique para ir à página anterior.']
  next:
    material: 'ARROW'
    name: '&aPróximo'
    lore: ['&7Clique para ir à próxima página.']

# Menu principal
main:
  name: '&8Correio - Seu Correio'
  size: 54
  slots: [10, 11, 12, 13, 14, 15, 16, 19, 20, 21, 22, 23, 24, 25, 28, 29, 30, 31, 32, 33, 34]
  perfil-slot: 49
  send-slot: 47
  collect-all-slot: 51
  empty-slot: 22
  previous-slot: 18
  next-slot: 26
  items:
    perfil:
      material: '{player}'
      name: '&aSuas informações'
      lore:
        - '&7Recompensas armazenadas: &a{recompensas}'
        - '&7Itens armazenados: &a{itens}'
        - '&7Total armazedos: &a{total}'

    send-all:
      material: '22d145c93e5eac48a661c6f27fdaff5922cf433dd627bf23eec378b9956197'
      name: '&aEnviar'
      lore:
        - '&7Clique para enviar um item'
        - '&7para um jogador.'

    permission-collect-all:
      material: 'HOPPER_MINECART'
      name: '&cRecolher todos'
      lore:
        - '&cVocê não tem permissão para isso!'

    collect-all:
      material: 'HOPPER_MINECART'
      name: '&aRecolher todos'
      lore:
        - '&7Clique para recolher'
        - '&7todos as suas recompensas.'

    empty:
      material: 'HOPPER_MINECART'
      name: '&cVazio...'
      lore: [ '&7Seu correio esta vazio :c' ]

# Menu de enviar
send-menu:
  name: '&8Correio - Enviar ({player})'
  size: 54
  slots: [10, 11, 12, 13, 14, 15, 16, 19, 20, 21, 22, 23, 24, 25, 28, 29, 30, 31, 32, 33, 34]
  back-slot: 48
  confirm-slot: 50
  items:
    confirm:
      material: '22d145c93e5eac48a661c6f27fdaff5922cf433dd627bf23eec378b9956197'
      name: '&aConfirmar'
      lore:
        - '&7Clique para enviar os itens'
        - '&7para o jogador selecionado.'
        - ''
        - '&aClique para confirmar!'
    barrier:
      enable: true
      glow: false
      material: 'STAINED_GLASS_PANE:7'
      name: ' '
      lore:
        - ''
