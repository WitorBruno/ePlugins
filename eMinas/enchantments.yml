# Apague apenas os encantamentos que não for usar
enchantments:
  Efficiency: # Não mude este nome, ou o encantamento não será reconhecido
    name: 'Eficiência'
    # Nível da picareta necessário para poder evoluir o encantamento
    pickaxe-level: 0
    # order do ícone no menu
    order: 1
    # Aparecer no menu de evolução
    show-menu: true
    # Poder evoluir pagando no menu de evolução
    can-buy: true
    # Mostrar um ícone de infinito no lugar do nível
    # do encantamento na lore
    show-infinity: false
    # Permissão para usar o encantamento
    # Deixe vazio para não usar
    permission: ''
    # Permissão para comprar o encantamento
    # Deixe vazio para não usar
    permission-buy: ''
    # Whitelist de skins que o encantamento irá funciona
    # Deixe vazio para não usar
    # Coloque a "order" da skin. Exemplo: [ 1 ]
    skin-whitelist: ['']
    # Mostrar o encantamento no menu caso o jogador não tenha a skin da whitelist
    show-skin-whitelist: false
    # Niveis do encantamento
    level:
      default: 0.0
      max: 10.0 # Use -1 para ser infinito
    # Preços default
    prices-default:
      price1:
        provider: 'eminas'
        price: 10000.0
    # Preços por nivel
    prices-perlevel:
      price1:
        provider: 'money'
        price: 10000.0
    # Preços para desencantar a feramenta
    prices-disenchanting:
      price1:
        provider: 'money'
        price: 9000.0
      price2:
        provider: 'eminas'
        price: 100.0
    displays: # Item que aparecerá no menu de evolução
      he-can: # quando puder evoluir
        material: 'DIAMOND_PICKAXE'
        name: '&aEficiencia'
        lore:
          - '&7Este encantamento permite que você'
          - '&7minere com mais agilidade.'
          - ''
          - '&f > Nível: &a{current}&f/&a{max}'
          - ''
          - '&f > Custo: &a{money} money'
          - '&f > Nível necessário: &a{level}'
          - ''
          - '&7Botão &fESQUERDO &7Para evoluir 1x'
          - '&7Botão &fDIREITO &7Para escolher a quantia de evolução'
          - '&7Botão &fQ &7Para evoluir o possível'
      cant: # quando não puder evoluir
        material: 'DIAMOND_PICKAXE'
        name: '&aEficiencia'
        lore:
          - '&7Este encantamento permite que você'
          - '&7minere com mais agilidade.'
          - ''
          - '&f > Nível: &a{current}&f/&a{max}'
          - ''
          - '&f > Custo: &a{money} money'
          - '&f > Nível necessário: &a{level}'
          - ''
          - '&cVocê não tem blocos ou nível suficientes.'
      max: # quando já estiver no máximo
        material: 'DIAMOND_PICKAXE'
        name: '&aEficiencia'
        lore:
          - '&7Este encantamento permite que você'
          - '&7minere com mais agilidade.'
          - ''
          - '&f > Nível: &a{current}&f/&a{max}'
          - ''
          - '&cVocê já está no máximo.'
