    - '&aComandos disponíveis:'
    - ''
    - ' &8> &a/mina &8- &7Abre o menu principal.'
    - ' &8> &a/mina editor <mina> &8- &7Abre o menu de gerenciamento da mina.'
    - ' &8> &a/mina ir &8- &7Vai até a sua maior mina.'
    - ' &8> &a/mina ir <mina> &8- &7Vai até uma mina específica.'
    - ' &8> &a/mina sair &8- &7Sai de uma mina.'
    - ' &8> &a/mina classes &8- &7Abre o menu de classes.'
    - ' &8> &a/mina list &8- &7Abre o menu de minas.'
    - ' &8> &a/mina create <nome> &8- &7Cria uma nova mina.'
    - ' &8> &a/mina delete <nome> &8- &7Deleta uma mina existente.'
    - ' &8> &a/mina reset <nome> &8- &7Reseta a mina.'
    - ' &8> &a/mina setspawn <nome> &8- &7Define o local de spawn da mina.'
    - ' &8> &a/mina delspawn <nome> &8- &7Deleta o local de spawn da mina.'
    - ' &8> &a/mina setsaida <nome> &8- &7Define o local de saida da mina.'
    - ' &8> &a/mina delsaida <nome> &8- &7Deleta o local de saida da mina.'
    - ' &8> &a/mina sethologram <nome> &8- &7Define o holograma da mina.'
    - ' &8> &a/mina delhologram <nome> &8- &7Deleta o holograma da mina.'
    - ' &8> &a/mina addclasse <player> <classe> &8- &7Adiciona uma classe a um jogador.'
    - ' &8> &a/mina removeclasse <player> <classe> &8- &7Remove uma classe de um jogador.'
    - ' &8> &a/mina setclasse <player> <classe> &8- &7Define uma classe a um jogador.'
    - ' &8> &a/mina resetclasse <player> &8- &7Reseta as classes de um jogador.'
    - ' &8> &a/mina resetpickaxe <player> &8- &7Reseta a picareta de um jogador.'
    - ' &8> &a/mina givelevel <all/player> <quantia> &8- &7Dar nível de picareta para um jogador.'
    - ' &8> &a/mina removelevel <player> <quantia> &8- &7Remover nível da picareta de um jogador.'
    - ' &8> &a/mina giveenergy <all/player> <quantia> &8- &7Dar energia da picareta para um jogador.'
    - ' &8> &a/mina removeenergy <player> <quantia> &8- &7Remover energia da picareta de um jogador.'
    - ' &8> &a/mina giveskin <all/player> <skin> <quantia> &8- &7Dar skin da picareta para um jogador.'
    - ' &8> &a/mina removeskin <player> <skin|all> &8- &7Remove skin da picareta de um jogador.'
    - ' &8> &a/mina givebooster <all/player> <booster> <quantia> &8- &7Dar boosters para um jogador.'
    - ' &8> &a/mina manutencao <mina> &8- &7Define uma mina em manutenção.'
    - ' &8> &a/mina kickall <mina> &8- &7Remove todos os jogadores de uma mina.'
    - ' &8> &a/mina reload &8- &7Recarrega as configurações das minas.'
